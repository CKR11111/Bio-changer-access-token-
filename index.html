<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKRPRO TOOL</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eaf2ff,#ffffff);
}

.container {
    width:90%;
    max-width:360px;
    padding:25px;
    border-radius:35px;

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

.title {
    text-align:center;
    font-size:22px;
    font-weight:600;
    margin-bottom:20px;
    color:#111;
}

.input {
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    margin-bottom:12px;

    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(10px);

    font-size:14px;
}

select {
    width:100%;
    padding:15px;
    border-radius:18px;
    border:none;
    margin-bottom:12px;
    background:rgba(255,255,255,0.5);
}

button {
    width:100%;
    padding:16px;
    border:none;
    border-radius:20px;
    font-size:15px;
    font-weight:600;

    background:#000;
    color:#fff;

    transition:0.2s;
}

button:active {
    transform:scale(0.96);
}

#log {
    margin-top:15px;
    font-size:12px;
    text-align:center;
    color:#333;
}
</style>
</head>

<body>

<div class="container">

<div class="title">CKRPRO TOOL</div>

<input id="token" class="input" placeholder="Access Token">
<input id="bio" class="input" placeholder="Bio Message">

<select id="color">
<option value="RED">🔴 RED</option>
<option value="GREEN">🟢 GREEN</option>
<option value="BLUE">🔵 BLUE</option>
<option value="PINK">🌸 PINK</option>
<option value="YELLOW">🟡 YELLOW</option>
</select>

<button onclick="run()">Update Bio</button>

<div id="log">Ready...</div>

</div>

<script>
function log(msg,color="black"){
    let el=document.getElementById("log");
    el.style.color=color;
    el.innerText=msg;
}

async function run(){
    let token=document.getElementById("token").value.trim();
    let bio=document.getElementById("bio").value.trim();
    let color=document.getElementById("color").value;

    if(!token || !bio){
        log("Fill all fields","red");
        return;
    }

    log("Updating...","blue");

    let url=`https://bio.up.railway.app/bio?bio=${encodeURIComponent(bio)}&colour=${color}&access=${token}`;

    try{
        // FAST DIRECT TRY
        let res=await fetch(url);
        let text=await res.text();

        if(text.toLowerCase().includes("success")){
            log("Success ✅","green");
        }else{
            log(text,"red");
        }

    }catch(e){

        log("Retrying...","orange");

        try{
            // FALLBACK (ONLY IF NEEDED)
            let res2=await fetch("https://corsproxy.io/?"+encodeURIComponent(url));
            let text2=await res2.text();

            if(text2.toLowerCase().includes("success")){
                log("Success ✅","green");
            }else{
                log("Failed ❌","red");
            }

        }catch(e2){
            log("Network Error ❌","red");
        }
    }
}
</script>

</body>
</html>
