<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKRPRO BIO - FF TOOL</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: rgba(25, 25, 28, 0.95);
            --blue: #007aff;
            --green: #32d74b;
            --red: #ff453a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; color: var(--text);
        }

        .container { width: 100%; max-width: 420px; }

        .header {
            text-align: center; padding: 30px 20px;
            background: linear-gradient(135deg, #1c1c1e, #007aff);
            border-radius: 24px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; }
        .header p { margin: 5px 0 0 0; font-size: 12px; opacity: 0.6; }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 { font-size: 14px; margin: 0 0 15px 0; color: #8e8e93; display: flex; align-items: center; }
        h2::before { content: ''; width: 3px; height: 14px; background: var(--blue); margin-right: 10px; border-radius: 2px; }

        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .color-btn {
            background: rgba(255,255,255,0.08); border: none; padding: 12px;
            border-radius: 12px; font-weight: 800; font-size: 12px;
            cursor: pointer; color: #fff;
        }

        input {
            width: 100%; padding: 16px; margin-bottom: 12px;
            border-radius: 16px; border: none; font-size: 14px;
            background: rgba(255,255,255,0.06); color: white; outline: none;
        }

        .btn {
            width: 100%; padding: 18px; background: var(--blue);
            color: white; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 700; cursor: pointer;
        }

        .terminal {
            background: #000; border-radius: 16px; padding: 16px;
            margin-top: 12px; min-height: 55px;
            font-family: 'SF Mono', monospace; font-size: 11px; color: #a1a1a6;
            word-break: break-all;
        }

        .log-ok { color: var(--green); }
        .log-err { color: var(--red); }
        .log-wait { color: #636366; font-style: italic; }

        .toast {
            position: fixed; bottom: 30px; background: #fff; color: #000;
            padding: 10px 20px; border-radius: 40px; display: none; font-size: 13px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">Copied!</div>

    <div class="container">
        <div class="header">
            <h1>CKRPRO BIO</h1>
            <p>FREE FIRE TOOL </p>
        </div>

        <div class="card">
            <h2>Color Codes</h2>
            <div class="color-grid">
                <div class="color-btn" onclick="copy('[FFFF00]')" style="color:#FFD700;">[FFFF00]</div>
                <div class="color-btn" onclick="copy('[FF0000]')" style="color:#FF453A;">[FF0000]</div>
                <div class="color-btn" onclick="copy('[00FF00]')" style="color:#32D74B;">[00FF00]</div>
                <div class="color-btn" onclick="copy('[0000FF]')" style="color:#0A84FF;">[0000FF]</div>
                <div class="color-btn" onclick="copy('[FF00FF]')" style="color:#BF5AF2;">[FF00FF]</div>
                <div class="color-btn" onclick="copy('[b][c]')" style="color:#8E8E93;">[b][c]</div>
            </div>
        </div>

        <div class="card">
            <h2>1. Get JWT Token</h2>
            <input type="text" id="acc" placeholder="Paste Access Token">
            <button class="btn" onclick="getJWT()">Generate JWT</button>
            <div class="terminal" id="t1"><div class="log-wait">> Ready...</div></div>
        </div>

        <div class="card">
            <h2>2. Apply Bio</h2>
            <input type="text" id="jBio" placeholder="Bio Text with Colors">
            <input type="text" id="jToken" placeholder="JWT (Auto-filled)">
            <button class="btn" onclick="bioJWT()">Update Now</button>
            <div class="terminal" id="t3"><div class="log-wait">> Waiting for JWT...</div></div>
        </div>
    </div>

    <script>
        function copy(txt) {
            navigator.clipboard.writeText(txt);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1500);
        }

        function log(id, msg, type) {
            document.getElementById(id).innerHTML = `<div class="log-${type}">> ${msg}</div>`;
        }

        // --- ULTRA STABLE PROXY ENGINE ---
        async function universalFetch(targetUrl) {
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
                `https://thingproxy.freeboard.io/fetch/${targetUrl}`
            ];

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (!response.ok) continue;
                    
                    const data = await response.text();
                    // Handle AllOrigins JSON wrapping
                    if (proxy.includes("allorigins")) {
                        const json = JSON.parse(data);
                        return json.contents;
                    }
                    return data;
                } catch (err) {
                    console.log("Proxy failed, trying next...");
                }
            }
            throw new Error("All proxies failed");
        }

        async function getJWT() {
            const token = document.getElementById('acc').value.trim();
            if(!token) return log('t1', 'Error: Token missing!', 'err');
            log('t1', 'Waking up Render (10-20s)...', 'wait');
            
            try {
                const target = `https://access-token-to-jwt-token.onrender.com/rizer?access_token=${token}`;
                const result = await universalFetch(target);
                const data = JSON.parse(result);
                if(data.success) {
                    log('t1', 'JWT Created!', 'ok');
                    document.getElementById('jToken').value = data.jwt;
                } else { log('t1', 'Failed: ' + (data.error || 'Invalid'), 'err'); }
            } catch (e) { log('t1', 'Network busy, try again in 5s.', 'err'); }
        }

        async function bioJWT() {
            const bio = document.getElementById('jBio').value;
            const jwt = document.getElementById('jToken').value.trim();
            if(!jwt) return log('t3', 'Error: Need JWT first!', 'err');
            log('t3', 'Updating Bio...', 'wait');

            try {
                const target = `https://long-bio-api.onrender.com/bio_upload?bio=${encodeURIComponent(bio)}&jwt=${jwt}`;
                const result = await universalFetch(target);
                log('t3', result || 'Bio Updated!', 'ok');
            } catch (e) { log('t3', 'Failed to connect. Retry.', 'err'); }
        }
    </script>
</body>
</html>
