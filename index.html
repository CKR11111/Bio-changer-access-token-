<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKRPRO BIO ULTRA</title>

<style>
:root{
--bg:#0a0a0c;
--card:rgba(25,25,28,0.95);
--blue:#007aff;
--green:#32d74b;
--red:#ff453a;
--text:#fff;
}

body{
background:var(--bg);
font-family:-apple-system,sans-serif;
display:flex;
justify-content:center;
padding:20px;
margin:0;
color:var(--text);
}

.container{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
gap:18px;
}

.header{
text-align:center;
padding:25px;
border-radius:24px;
background:linear-gradient(135deg,#1c1c1e,#007aff);
}

.card{
background:var(--card);
backdrop-filter:blur(20px);
border-radius:22px;
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
}

h3{
margin:0;
font-size:14px;
color:#8e8e93;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:#fff;
box-sizing:border-box;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:var(--blue);
color:#fff;
font-weight:bold;
}

/* TERMINAL */
.terminal{
height:120px;
border-radius:14px;
overflow:hidden;
background:#000;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* STATUS */
.status{
font-size:12px;
margin-top:5px;
}
.ok{color:var(--green);}
.err{color:var(--red);}

/* COLOR GRID */
.color-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.color-btn{
background:linear-gradient(135deg,#007aff,#0051c7);
padding:12px;
border-radius:14px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
cursor:pointer;
transition:0.2s;
}

.color-btn:active{
transform:scale(0.95);
}

.c-name{
font-size:11px;
opacity:0.8;
}

.c-code{
font-size:13px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>CKRPRO BIO ULTRA</h2>
</div>

<!-- COLOR -->
<div class="card">
<h3>Color Codes</h3>

<div class="color-grid">

<div class="color-btn" onclick="copy('[FFFF00]')">
<span class="c-name">Yellow</span>
<span class="c-code">[FFFF00]</span>
</div>

<div class="color-btn" onclick="copy('[FF0000]')">
<span class="c-name">Red</span>
<span class="c-code">[FF0000]</span>
</div>

<div class="color-btn" onclick="copy('[00FF00]')">
<span class="c-name">Green</span>
<span class="c-code">[00FF00]</span>
</div>

<div class="color-btn" onclick="copy('[0000FF]')">
<span class="c-name">Blue</span>
<span class="c-code">[0000FF]</span>
</div>

<div class="color-btn" onclick="copy('[FF00FF]')">
<span class="c-name">Magenta</span>
<span class="c-code">[FF00FF]</span>
</div>

<div class="color-btn" onclick="copy('[b][c]')">
<span class="c-name">Bold + Color</span>
<span class="c-code">[b][c]</span>
</div>

</div>
</div>

<!-- JWT -->
<div class="card">
<h3>Generate JWT</h3>
<input id="acc" placeholder="Access Token">
<button id="btn1" onclick="getJWT()">Generate JWT</button>

<div class="terminal">
<iframe id="frame1"></iframe>
</div>

<div id="status1" class="status"></div>
</div>

<!-- BIO -->
<div class="card">
<h3>Apply Bio</h3>
<input id="bio" placeholder="Enter Bio">
<input id="jwt" placeholder="JWT auto-filled" readonly>

<button id="btn2" onclick="setBio()">Update Bio</button>

<div class="terminal">
<iframe id="frame2"></iframe>
</div>

<div id="status2" class="status"></div>
</div>

</div>

<script>

/* COPY */
function copy(txt){
navigator.clipboard.writeText(txt);
showToast("Copied: "+txt);
}

/* TOAST */
function showToast(msg){
let t=document.createElement("div");
t.innerText=msg;
t.style.position="fixed";
t.style.bottom="30px";
t.style.left="50%";
t.style.transform="translateX(-50%)";
t.style.background="#fff";
t.style.color="#000";
t.style.padding="8px 18px";
t.style.borderRadius="20px";
t.style.fontSize="12px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),1500);
}

/* WAIT */
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

/* FETCH */
async function smartFetch(url){

try{
let r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url));
let j=await r.json();
if(j.contents) return j.contents;
}catch(e){}

try{
let r=await fetch("https://corsproxy.io/?"+encodeURIComponent(url));
let t=await r.text();
if(t) return t;
}catch(e){}

try{
let r=await fetch(url);
return await r.text();
}catch(e){}

throw "fail";
}

/* JWT EXTRACT */
function extractJWT(text){
try{
let j=JSON.parse(text);
if(j.jwt) return j.jwt;
}catch(e){}

let m=text.match(/[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+/);
return m?m[0]:null;
}

/* GET JWT */
async function getJWT(){

let token=document.getElementById("acc").value.trim();
let btn=document.getElementById("btn1");
let frame=document.getElementById("frame1");
let jwt=document.getElementById("jwt");
let status=document.getElementById("status1");

if(!token){
status.innerHTML='<span class="err">Enter Token</span>';
return;
}

btn.innerText="Generating...";
btn.disabled=true;
status.innerText="⏳ Processing...";

frame.src=`https://access-token-to-jwt-token.onrender.com/rizer?access_token=${token}`;

try{

await wait(3000);

let res=await smartFetch(frame.src);

if(!res || res.length<20){
await wait(3000);
res=await smartFetch(frame.src);
}

let j=extractJWT(res);

if(j){
jwt.value=j;
status.innerHTML='<span class="ok">JWT SUCCESS ✔</span>';
}else{
status.innerHTML='<span class="err">JWT NOT FOUND</span>';
}

}catch(e){
status.innerHTML='<span class="err">Connection Failed</span>';
}

btn.innerText="Generate JWT";
btn.disabled=false;
}

/* BIO */
function setBio(){

let bio=document.getElementById("bio").value.trim();
let jwt=document.getElementById("jwt").value.trim();
let btn=document.getElementById("btn2");
let frame=document.getElementById("frame2");
let status=document.getElementById("status2");

if(!jwt){
status.innerHTML='<span class="err">JWT Missing</span>';
return;
}

btn.innerText="Updating...";
btn.disabled=true;

frame.src=`https://long-bio-api.onrender.com/bio_upload?bio=${encodeURIComponent(bio)}&jwt=${jwt}`;

setTimeout(()=>{
status.innerHTML='<span class="ok">Request Sent ✔</span>';
btn.innerText="Update Bio";
btn.disabled=false;
},2000);
}

</script>

</body>
</html>
